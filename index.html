<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>營養獵人</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-wrap">

  <h1 class="app-title">營養獵人</h1>

  <!-- ── 輸入面板 ── -->
  <div class="card">
    <div class="input-grid">
      <div class="field">
        <label>體重 (kg)</label>
        <input type="number" id="in-weight" value="70" min="30" max="200" step="0.5">
      </div>
      <div class="field">
        <label>身高 (cm)</label>
        <input type="number" id="in-height" value="170" min="100" max="230" step="1">
      </div>
      <div class="field">
        <label>年齡 (歲)</label>
        <input type="number" id="in-age" value="30" min="10" max="100" step="1">
      </div>
      <div class="field">
        <label>性別</label>
        <select id="in-sex">
          <option value="male">男性</option>
          <option value="female">女性</option>
        </select>
      </div>
    </div>

    <p style="font-size:13px;font-weight:600;margin-bottom:8px;color:#6b6b6b;">今日運動（小時）</p>
    <div class="exercise-list" id="exercise-list"></div>
    <button class="btn-add-ex" onclick="addExerciseRow()">＋ 新增運動</button>

    <div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
      <button class="btn-primary" onclick="calcTargets()">計算熱量</button>
      <div id="tdee-display" style="font-size:15px;font-weight:600;color:#1a1a1a;line-height:1.6;"></div>
    </div>
  </div>

  <!-- ── 主要內容：六角圖 + 推薦 ── -->
  <div class="main-content">

    <!-- 六角形圖表 -->
    <div class="hex-col card">
      <canvas id="hexCanvas"></canvas>
      <div class="stats-row" id="stats-row"></div>
      <div id="target-grid" class="target-grid hidden"></div>
    </div>

    <!-- 食物推薦 -->
    <div class="rec-col">

      <div class="card" id="rec-panel">
        <p class="section-title">推薦食物</p>
        <p class="muted" id="rec-placeholder">請先計算今日目標，再點擊「取得推薦」。</p>
        <div class="food-list" id="food-list"></div>
        <ul class="tips-list hidden" id="tips-list"></ul>
        <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn-primary hidden" id="btn-recommend"
                  onclick="getRecommend()">取得推薦</button>
          <button class="btn-cancel hidden" id="btn-cancel-recommend"
                  onclick="cancelRecommend()">取消推薦</button>
        </div>
      </div>

    </div>

    <!-- 使用步驟 -->
    <div class="steps-col">
      <div class="card steps-card">
        <p class="section-title" style="margin-bottom:14px;">使用步驟</p>
        <ol class="steps-list">
          <li><span class="step-num">1</span><span class="step-text">基礎設定<br><small>輸入體重、身高、年齡、性別</small></span></li>
          <li><span class="step-num">2</span><span class="step-text">計算熱量<br><small>點擊「計算熱量」取得 BMR / TDEE</small></span></li>
          <li><span class="step-num">3</span><span class="step-text">加入食物<br><small>從食物資料庫選擇已吃的食物</small></span></li>
          <li><span class="step-num">4</span><span class="step-text">取得推薦<br><small>根據缺口推薦補充食物</small></span></li>
        </ol>
      </div>
    </div>
  </div>

  <!-- ── 食物資料庫卡片軸 ── -->
  <div class="card catalog-section">
    <div class="catalog-header">
      <p class="section-title">食物資料庫</p>
      <div class="catalog-filters" id="catalog-filters"></div>
    </div>
    <div class="catalog-track-wrap">
      <button class="scroll-arrow left"  onclick="scrollCatalog(-1)">&#8249;</button>
      <div class="catalog-track" id="catalog-track"></div>
      <button class="scroll-arrow right" onclick="scrollCatalog(1)">&#8250;</button>
    </div>
  </div>

  <!-- ── 新增食物 ── -->
  <div class="card" id="add-food-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <p class="section-title">新增食物</p>
      <button class="btn-add-ex" onclick="toggleAddFoodForm()">展開 ▾</button>
    </div>
    <div id="add-food-form" class="hidden">
      <div class="add-food-grid">
        <div class="field"><label>名稱</label><input type="text"   id="af-name"    placeholder="例：燙青江菜"></div>
        <div class="field"><label>分類</label>
          <select id="af-cat">
            <option>主食</option><option>肉類</option><option>蛋類</option>
            <option>蔬菜</option><option>水果</option><option>乳製品</option>
            <option>堅果</option><option>豆類</option>
          </select>
        </div>
        <div class="field"><label>碳水 (g/100g)</label>   <input type="number" id="af-carb"    min="0" step="0.1" placeholder="0"></div>
        <div class="field"><label>蛋白質 (g/100g)</label> <input type="number" id="af-prot"    min="0" step="0.1" placeholder="0"></div>
        <div class="field"><label>脂肪 (g/100g)</label>   <input type="number" id="af-fat"     min="0" step="0.1" placeholder="0"></div>
        <div class="field"><label>膳食纖維 (g/100g)</label><input type="number" id="af-fiber"   min="0" step="0.1" placeholder="0"></div>
        <div class="field"><label>微量評分 (0–100)</label> <input type="number" id="af-micro"   min="0" max="100" step="1" placeholder="30"></div>
        <div class="field"><label>鈉 (mg/100g)</label>    <input type="number" id="af-sodium"  min="0" step="1"   placeholder="0"></div>
      </div>
      <div style="margin-top:16px;display:flex;gap:12px;align-items:center;">
        <button class="btn-primary" onclick="submitAddFood()">新增食物</button>
        <span id="af-msg" class="muted"></span>
      </div>
    </div>
  </div>

  <!-- ── 已加入食物 ── -->
  <div class="card hidden" id="eaten-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <p class="section-title">已加入食物</p>
      <span id="eaten-count" class="muted"></span>
    </div>
    <div id="eaten-list"></div>
  </div>

  <!-- ── 自動缺口面板 ── -->
  <div class="card" id="deficit-panel">
    <p class="section-title" style="margin-bottom:12px;">今日營養缺口</p>
    <div id="deficit-list"><p class="muted">請先點擊「計算熱量」以取得每日目標。</p></div>
  </div>

</div><!-- .app-wrap -->

<script src="nutrition.js"></script>
<script src="hexagon.js"></script>
<script src="app.js"></script>

</body>
</html>
